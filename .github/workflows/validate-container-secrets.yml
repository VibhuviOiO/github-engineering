name: Validate Container Registry Secrets

description: |
  Test registry authentication without building or pushing images.
  Useful after adding Docker Hub, Quay, or other registry secrets to a repository.
  Fails fast with a clear message when required secrets are missing.

on:
  workflow_call:
    inputs:
      ghcr-enabled:
        description: Validate GitHub Container Registry login.
        required: false
        type: boolean
        default: true

      dockerhub-enabled:
        description: Validate Docker Hub login.
        required: false
        type: boolean
        default: false

      quay-enabled:
        description: Validate Quay.io login.
        required: false
        type: boolean
        default: false

    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username.
        required: false

      DOCKERHUB_TOKEN:
        description: Docker Hub access token.
        required: false

      QUAY_USERNAME:
        description: Quay.io username.
        required: false

      QUAY_TOKEN:
        description: Quay.io password or robot token.
        required: false

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Validate Registry Logins
    runs-on: ubuntu-latest

    steps:
      - name: Check Docker Hub secrets
        if: ${{ inputs.dockerhub-enabled }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [ -z "$DOCKERHUB_USERNAME" ] && missing+=("DOCKERHUB_USERNAME")
          [ -z "$DOCKERHUB_TOKEN" ] && missing+=("DOCKERHUB_TOKEN")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Docker Hub secrets: ${missing[*]}"
            echo "::error::Add them as repository or organization secrets, then re-run this workflow."
            exit 1
          fi

          echo "Docker Hub secrets are present."

      - name: Check Quay.io secrets
        if: ${{ inputs.quay-enabled }}
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          missing=()
          [ -z "$QUAY_USERNAME" ] && missing+=("QUAY_USERNAME")
          [ -z "$QUAY_TOKEN" ] && missing+=("QUAY_TOKEN")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Quay.io secrets: ${missing[*]}"
            echo "::error::Add them as repository or organization secrets, then re-run this workflow."
            exit 1
          fi

          echo "Quay.io secrets are present."

      - name: Validate GitHub Container Registry
        if: ${{ inputs.ghcr-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub
        if: ${{ inputs.dockerhub-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate Quay.io
        if: ${{ inputs.quay-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Summary
        run: |
          echo "### Registry Secret Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Enabled | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR     | ${{ inputs.ghcr-enabled }} | ${{ inputs.ghcr-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | ${{ inputs.dockerhub-enabled }} | ${{ inputs.dockerhub-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quay.io  | ${{ inputs.quay-enabled }} | ${{ inputs.quay-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All enabled registries authenticated successfully." >> "$GITHUB_STEP_SUMMARY"
