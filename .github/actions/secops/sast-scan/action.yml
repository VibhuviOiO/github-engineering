name: SAST Scan

description: Static Application Security Testing using Semgrep.

runs:
  using: composite

  steps:

    - name: Install Semgrep
      shell: bash
      run: |
        python -m pip install semgrep

    - name: Run Semgrep Scan
      shell: bash
      run: |
        semgrep scan --config auto .

