name: Container Image Scan



description: Scan container images for vulnerabilities using Trivy.



inputs:



  image-ref:

    description: Image reference to scan.

    required: true



runs:

  using: composite



  steps:



    - name: Install Trivy

      shell: bash

      run: |

        sudo apt-get update

        sudo apt-get install -y wget

        wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

        sudo mv ./bin/trivy /usr/local/bin/trivy



    - name: Scan Container Image

      shell: bash

      run: |

        trivy image --severity HIGH,CRITICAL "${{ inputs.image-ref }}"







