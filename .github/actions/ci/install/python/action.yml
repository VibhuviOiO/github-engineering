name: Install Dependencies

description: Install dependencies for supported technology stacks.

inputs:

  tech-stack:
    description: Technology stack
    required: true

  python-version:
    description: Python version
    required: false
    default: "3.13.7"

  node-version:
    description: NodeJS version
    required: false
    default: "22"

  java-version:
    description: Java version
    required: false
    default: "21"

  requirements-file:
    description: Python requirements file
    required: false
    default: requirements.txt

runs:
  using: composite

  steps:

    # Python

    - name: Set up Python
      if: inputs.tech-stack == 'python'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-file }}

    - name: Install Python Requirements
      if: inputs.tech-stack == 'python'
      shell: bash
      run: |
        pip install -r "${{ inputs.requirements-file }}"

    # NodeJS

    - name: Set up NodeJS
      if: inputs.tech-stack == 'nodejs'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install NodeJS Dependencies
      if: inputs.tech-stack == 'nodejs'
      shell: bash
      run: |
        npm ci

    # Java Maven

    - name: Set up Java
      if: inputs.tech-stack == 'java'
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
        cache: maven

    - name: Install Java Dependencies
      if: inputs.tech-stack == 'java'
      shell: bash
      run: |
        mvn dependency:resolve

    # Go

    - name: Set up Go
      if: inputs.tech-stack == 'go'
      uses: actions/setup-go@v5
      with:
        go-version: "1.24"

    - name: Download Go Dependencies
      if: inputs.tech-stack == 'go'
      shell: bash
      run: |
        go mod download