name: Container Publish

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name without registry prefix (e.g. "ldap-manager").
        required: true
        type: string

      dockerfile:
        description: Path to the Dockerfile relative to the repository root.
        required: false
        type: string
        default: Dockerfile

      build-context:
        description: Docker build context path.
        required: false
        type: string
        default: .

      platforms:
        description: Comma-separated list of target platforms.
        required: false
        type: string
        default: linux/amd64

      push:
        description: Push the image to registries after building.
        required: false
        type: boolean
        default: true

      tags:
        description: |
          Multi-line docker/metadata-action tag rules.
          Default: latest + short git SHA.
        required: false
        type: string
        default: |
          type=raw,value=latest
          type=sha,prefix=

      ghcr-enabled:
        description: Publish to GitHub Container Registry (ghcr.io).
        required: false
        type: boolean
        default: true

      dockerhub-enabled:
        description: Publish to Docker Hub (docker.io).
        required: false
        type: boolean
        default: false

      dockerhub-namespace:
        description: |
          Docker Hub namespace. Defaults to the GitHub repository owner.
          Required when dockerhub-enabled is true.
        required: false
        type: string
        default: ''

      quay-enabled:
        description: Publish to Quay.io.
        required: false
        type: boolean
        default: false

      quay-namespace:
        description: |
          Quay.io namespace. Defaults to the GitHub repository owner.
          Required when quay-enabled is true.
        required: false
        type: string
        default: ''

      quay-continue-on-error:
        description: |
          Continue publishing to other registries if Quay.io login fails.
          When true, Quay is skipped and a warning is emitted instead of failing the job.
        required: false
        type: boolean
        default: false

      use-cache:
        description: Enable GitHub Actions cache for Docker layers.
        required: false
        type: boolean
        default: true

      provenance:
        description: Generate build provenance attestation.
        required: false
        type: boolean
        default: false

      sbom:
        description: Generate SBOM attestation during build.
        required: false
        type: boolean
        default: false

      build-args:
        description: |
          Multi-line Docker build arguments (ARG key=value).
          Example: OPENLDAP_VERSION=2.6.8
        required: false
        type: string
        default: ''

    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username. Required when dockerhub-enabled is true.
        required: false

      DOCKERHUB_TOKEN:
        description: Docker Hub access token. Required when dockerhub-enabled is true.
        required: false

      QUAY_USERNAME:
        description: Quay.io username. Required when quay-enabled is true.
        required: false

      QUAY_TOKEN:
        description: Quay.io encrypted password or robot token. Required when quay-enabled is true.
        required: false

    outputs:
      image-tags:
        description: Comma-separated list of published image tags.
        value: ${{ jobs.build-and-push.outputs.image-tags }}

      digest:
        description: Image digest of the built image.
        value: ${{ jobs.build-and-push.outputs.digest }}

      metadata:
        description: JSON metadata from docker/metadata-action.
        value: ${{ jobs.build-and-push.outputs.metadata }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.meta.outputs.json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: |
          owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=${owner_lower}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required registry secrets
        env:
          DOCKERHUB_ENABLED: ${{ inputs.dockerhub-enabled }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          QUAY_ENABLED: ${{ inputs.quay-enabled }}
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          fail=0

          if [ "$DOCKERHUB_ENABLED" = "true" ]; then
            missing=()
            [ -z "$DOCKERHUB_USERNAME" ] && missing+=("DOCKERHUB_USERNAME")
            [ -z "$DOCKERHUB_TOKEN" ] && missing+=("DOCKERHUB_TOKEN")
            if [ ${#missing[@]} -ne 0 ]; then
              echo "::error::Missing Docker Hub secrets: ${missing[*]}"
              echo "::error::Add them as repository or organization secrets, then re-run this workflow."
              fail=1
            fi
          fi

          if [ "$QUAY_ENABLED" = "true" ]; then
            missing=()
            [ -z "$QUAY_USERNAME" ] && missing+=("QUAY_USERNAME")
            [ -z "$QUAY_TOKEN" ] && missing+=("QUAY_TOKEN")
            if [ ${#missing[@]} -ne 0 ]; then
              echo "::error::Missing Quay.io secrets: ${missing[*]}"
              echo "::error::Add them as repository or organization secrets, then re-run this workflow."
              fail=1
            fi
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "All required registry secrets are present."

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.ghcr-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.dockerhub-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Quay.io
        id: quay-login
        if: ${{ inputs.quay-enabled }}
        continue-on-error: ${{ fromJSON(inputs.quay-continue-on-error) }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Determine Quay availability
        id: quay
        if: ${{ success() || steps.quay-login.outcome == 'failure' }}
        run: |
          if [ "${{ steps.quay-login.outcome }}" = "success" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.quay-enabled }}" = "true" ]; then
              echo "::warning::Quay.io login failed; skipping Quay publishing."
            fi
          fi

      - name: Build image list
        id: images
        run: |
          images=""
          if [ "${{ inputs.ghcr-enabled }}" = "true" ]; then
            images="${images}ghcr.io/${{ steps.owner.outputs.owner }}/${{ inputs.image-name }},"
          fi
          if [ "${{ inputs.dockerhub-enabled }}" = "true" ]; then
            ns="${{ inputs.dockerhub-namespace }}"
            [ -z "$ns" ] && ns="${{ steps.owner.outputs.owner }}"
            images="${images}${ns}/${{ inputs.image-name }},"
          fi
          if [ "${{ inputs.quay-enabled }}" = "true" ] && [ "${{ steps.quay.outputs.ok }}" = "true" ]; then
            ns="${{ inputs.quay-namespace }}"
            [ -z "$ns" ] && ns="${{ steps.owner.outputs.owner }}"
            images="${images}quay.io/${ns}/${{ inputs.image-name }},"
          fi
          # Remove trailing comma
          images="${images%,}"
          echo "images=${images}" >> "$GITHUB_OUTPUT"
          echo "Publishing to: ${images}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: ${{ inputs.tags }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}
          build-args: ${{ inputs.build-args }}
          cache-from: ${{ inputs.use-cache && 'type=gha' || '' }}
          cache-to: ${{ inputs.use-cache && 'type=gha,mode=max' || '' }}

      - name: Summary
        run: |
          quay_status="${{ inputs.quay-enabled }}"
          if [ "${{ inputs.quay-enabled }}" = "true" ] && [ "${{ steps.quay.outputs.ok }}" != "true" ]; then
            quay_status="true (login failed — skipped)"
          fi

          echo "### Container Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR     | ${{ inputs.ghcr-enabled }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | ${{ inputs.dockerhub-enabled }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quay.io  | ${quay_status} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
