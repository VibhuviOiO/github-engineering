name: FastAPI CI Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version used for the CI job.
        required: false
        type: string
        default: '3.13.7'
      requirements-file:
        description: Path to the requirements file.
        required: false
        type: string
        default: requirements.txt
      dockerfile:
        description: Path to the Dockerfile to build.
        required: false
        type: string
        default: Dockerfile
      image-name:
        description: Local image name used for Docker build validation.
        required: false
        type: string
        default: fastapi-app
      environment-name:
        description: Target environment name for deploy steps.
        required: false
        type: string
        default: dev

permissions:
  contents: read

jobs:
  pr-install:
    name: Install
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install requirements
        uses: VibhuviOiO/github-engineering/.github/actions/pip-install@main
        with:
          python-version: ${{ inputs.python-version }}
          requirements-file: ${{ inputs.requirements-file }}

  pr-quality:
    name: Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')
    needs: pr-install
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Quality check
        uses: VibhuviOiO/github-engineering/.github/actions/quality-check@main
        with:
          message: PR placeholder quality check completed.

  pr-build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')
    needs: pr-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        uses: VibhuviOiO/github-engineering/.github/actions/docker-build@main
        with:
          dockerfile: ${{ inputs.dockerfile }}
          image-name: ${{ inputs.image-name }}
          image-tag: ${{ github.sha }}

  pr-test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'develop')
    needs: pr-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test run
        uses: VibhuviOiO/github-engineering/.github/actions/test-run@main
        with:
          message: PR placeholder test completed.

  develop-install:
    name: Install
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install requirements
        uses: VibhuviOiO/github-engineering/.github/actions/pip-install@main
        with:
          python-version: ${{ inputs.python-version }}
          requirements-file: ${{ inputs.requirements-file }}

  develop-quality:
    name: Quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: develop-install
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Quality check
        uses: VibhuviOiO/github-engineering/.github/actions/quality-check@main
        with:
          message: Develop placeholder quality check completed.

  develop-build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: develop-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        uses: VibhuviOiO/github-engineering/.github/actions/docker-build@main
        with:
          dockerfile: ${{ inputs.dockerfile }}
          image-name: ${{ inputs.image-name }}
          image-tag: ${{ github.sha }}

  develop-test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: develop-build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test run
        uses: VibhuviOiO/github-engineering/.github/actions/test-run@main
        with:
          message: Develop placeholder test completed.

  develop-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    needs: develop-test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy to dev
        uses: VibhuviOiO/github-engineering/.github/actions/deploy-dev@main
        with:
          environment-name: ${{ inputs.environment-name }}
          message: Develop placeholder deploy completed.