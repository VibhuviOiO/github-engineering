name: Validate Container Registry Secrets

description: |
  Test registry authentication without building or pushing images.
  Useful after adding Docker Hub, Quay, or other registry secrets to a repository.
  Fails fast with a clear message when required secrets are missing.

on:
  workflow_call:
    inputs:
      ghcr-enabled:
        description: Validate GitHub Container Registry login.
        required: false
        type: boolean
        default: true

      dockerhub-enabled:
        description: Validate Docker Hub login.
        required: false
        type: boolean
        default: false

      dockerhub-username:
        description: Docker Hub username.
        required: false
        type: string
        default: ''

      quay-enabled:
        description: Validate Quay.io login.
        required: false
        type: boolean
        default: false

      quay-username:
        description: Quay.io username.
        required: false
        type: string
        default: ''

    secrets:
      dockerhub-token:
        description: Docker Hub access token.
        required: false

      quay-token:
        description: Quay.io password or robot token.
        required: false

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Validate Registry Logins
    runs-on: ubuntu-latest

    steps:
      - name: Check Docker Hub credentials
        if: ${{ inputs.dockerhub-enabled }}
        env:
          DOCKERHUB_USERNAME: ${{ inputs.dockerhub-username }}
          DOCKERHUB_TOKEN: ${{ secrets.dockerhub-token }}
        run: |
          missing=()
          [ -z "$DOCKERHUB_USERNAME" ] && missing+=("inputs.dockerhub-username")
          [ -z "$DOCKERHUB_TOKEN" ] && missing+=("secrets.dockerhub-token")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Docker Hub credentials: ${missing[*]}"
            echo "::error::Pass username as an input and token as a secret, then re-run this workflow."
            exit 1
          fi

          echo "Docker Hub credentials are present."

      - name: Check Quay.io credentials
        if: ${{ inputs.quay-enabled }}
        env:
          QUAY_USERNAME: ${{ inputs.quay-username }}
          QUAY_TOKEN: ${{ secrets.quay-token }}
        run: |
          missing=()
          [ -z "$QUAY_USERNAME" ] && missing+=("inputs.quay-username")
          [ -z "$QUAY_TOKEN" ] && missing+=("secrets.quay-token")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing Quay.io credentials: ${missing[*]}"
            echo "::error::Pass username as an input and token as a secret, then re-run this workflow."
            exit 1
          fi

          echo "Quay.io credentials are present."

      - name: Validate GitHub Container Registry
        if: ${{ inputs.ghcr-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub
        if: ${{ inputs.dockerhub-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.dockerhub-token }}

      - name: Validate Quay.io
        if: ${{ inputs.quay-enabled }}
        uses: VibhuviOiO/github-engineering/.github/actions/ci/registry-login@main
        with:
          registry: quay.io
          username: ${{ inputs.quay-username }}
          password: ${{ secrets.quay-token }}

      - name: Summary
        run: |
          echo "### Registry Secret Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Registry | Enabled | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GHCR     | ${{ inputs.ghcr-enabled }} | ${{ inputs.ghcr-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docker Hub | ${{ inputs.dockerhub-enabled }} | ${{ inputs.dockerhub-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quay.io  | ${{ inputs.quay-enabled }} | ${{ inputs.quay-enabled && 'checked' || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All enabled registries authenticated successfully." >> "$GITHUB_STEP_SUMMARY"
