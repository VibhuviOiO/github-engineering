name: Docker Build
description: Build a Docker image from a Dockerfile.

inputs:
  dockerfile:
    description: Path to the Dockerfile to build.
    required: false
    default: Dockerfile
  image-name:
    description: Local image name used for the Docker build.
    required: true
  image-tag:
    description: Image tag used for the Docker build.
    required: true

runs:
  using: composite
  steps:
    - name: Build image
      shell: bash
      run: docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.image-name }}:${{ inputs.image-tag }}" .