name: Test Run

description: Run tests for supported technology stacks.

inputs:

  tech-stack:
    description: Technology stack
    required: true

runs:
  using: composite

  steps:

    # Python

    - name: Run Python Tests
      if: inputs.tech-stack == 'python'
      shell: bash
      run: |
        pytest

    # NodeJS

    - name: Run NodeJS Tests
      if: inputs.tech-stack == 'nodejs'
      shell: bash
      run: |
        npm test

    # Java Maven

    - name: Run Java Maven Tests
      if: inputs.tech-stack == 'java'
      shell: bash
      run: |
        mvn test

    # Go

    - name: Run Go Tests
      if: inputs.tech-stack == 'go'
      shell: bash
      run: |
        go test ./...