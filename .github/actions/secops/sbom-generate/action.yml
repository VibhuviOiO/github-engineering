name: SBOM Generate
description: Placeholder software bill of materials generation step.

inputs:
  format:
    description: SBOM output format.
    required: false
    default: cyclonedx-json
  output-file:
    description: Output file path.
    required: false
    default: sbom.json
  message:
    description: Message shown in the workflow logs.
    required: false
    default: SBOM generation placeholder completed.

runs:
  using: composite
  steps:
    - name: SBOM placeholder
      shell: bash
      run: |
        echo "Format: ${{ inputs.format }}"
        echo "Output: ${{ inputs.output-file }}"
        echo "${{ inputs.message }}"