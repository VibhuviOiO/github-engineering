name: Python Pip Install Requirements
description: Install Python dependencies from a requirements file.

inputs:
  python-version:
    description: Python version to install before running pip.
    required: false
    default: 3.13.7
  requirements-file:
    description: Path to the requirements file.
    required: false
    default: requirements.txt

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.requirements-file }}

    - name: Install requirements
      shell: bash
      run: pip install -r "${{ inputs.requirements-file }}"