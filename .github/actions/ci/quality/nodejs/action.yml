name: NodeJS Quality Check

description: Run ESLint quality checks for NodeJS applications.

inputs:
  node-version:
    description: NodeJS version
    required: false
    default: "22"

runs:
  using: composite

  steps:

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install Dependencies
      shell: bash
      run: npm ci

    - name: Run ESLint
      shell: bash
      run: npm run lint