jobs:

install:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Install Dependencies
    uses: VibhuviOiO/github-engineering/.github/actions/ci/install/nodejs@main
    with:
      node-version: ${{ inputs.node-version }}
```

test:
needs: install
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Run Tests
    uses: VibhuviOiO/github-engineering/.github/actions/ci/test/nodejs@main
```

dependency-scan:
needs: test
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Dependency Scan
    uses: VibhuviOiO/github-engineering/.github/actions/secops/dependency-scan@main
    with:
      tech-stack: nodejs
```

secret-scan:
needs: dependency-scan
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Secret Scan
    uses: VibhuviOiO/github-engineering/.github/actions/secops/secret-scan@main
```

sast-scan:
needs: secret-scan
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: SAST Scan
    uses: VibhuviOiO/github-engineering/.github/actions/secops/sast-scan@main
```

container-security:
needs: sast-scan
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Docker Build
    uses: VibhuviOiO/github-engineering/.github/actions/ci/docker-build@main
    with:
      dockerfile: ${{ inputs.dockerfile }}
      image-name: ${{ inputs.image-name }}
      image-tag: ${{ github.sha }}

  - name: Container Image Scan
    uses: VibhuviOiO/github-engineering/.github/actions/secops/container-image@main
    with:
      image-ref: ${{ inputs.image-name }}:${{ github.sha }}

  - name: Generate SBOM
    uses: VibhuviOiO/github-engineering/.github/actions/secops/sbom-generate@main

  - name: Upload SBOM
    uses: actions/upload-artifact@v4
    with:
      name: sbom
      path: sbom.json
```
