name: NodeJS Install Dependencies

description: Install NodeJS dependencies using npm.

inputs:
  node-version:
    description: NodeJS version to install.
    required: false
    default: "22"

runs:
  using: composite

  steps:
    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci